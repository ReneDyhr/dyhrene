<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Used via FONTCONFIG_FILE: single writable cache dir (replaces default config tree). -->
<fontconfig>
	<dir>/usr/share/fonts</dir>
	<dir>/usr/local/share/fonts</dir>
	<cachedir>/var/www/html/storage/app/fontconfig-cache</cachedir>
</fontconfig>
